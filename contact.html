<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlueSpace — контакти</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f4f8ff;
        --surface: #ffffff;
        --primary: #2f6fe3;
        --primary-dark: #174ea8;
        --text: #122033;
        --muted: #6d7a8a;
        --border: #dce7f8;
        --shadow: 0 16px 40px rgba(47, 111, 227, 0.12);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Inter', sans-serif; color: var(--text); background: linear-gradient(135deg, #f8fbff 0%, #eef6ff 100%); }
      a { text-decoration: none; color: inherit; }
      .container { width: min(1160px, calc(100% - 32px)); margin: 0 auto; }
      header { padding: 24px 0 10px; }
      .nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.85); backdrop-filter: blur(18px); border-radius: 999px; padding: 12px 20px; box-shadow: var(--shadow); }
      .logo { font-weight: 800; color: var(--primary-dark); }
      .nav-links { display: flex; gap: 18px; color: var(--muted); font-weight: 500; }
      .page { padding: 24px 0 48px; }
      .card { background: var(--surface); border-radius: 28px; padding: 24px; box-shadow: var(--shadow); }
      .card h1 { margin-top: 0; font-size: clamp(1.8rem, 3.2vw, 2.4rem); }
      .card p, .card li { color: var(--muted); line-height: 1.7; }
      .contact-list { display: grid; gap: 10px; padding: 0; list-style: none; margin: 16px 0 0; }
      .contact-list li { background: #f8fbff; border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
      .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; background: var(--primary); color: white; font-weight: 600; margin-top: 14px; }
      footer { padding: 10px 0 36px; color: var(--muted); }
      @media (max-width: 760px) { .nav-links { display: none; } }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="nav">
          <a href="index.html" class="logo">BlueSpace</a>
          <div class="nav-links">
            <a href="catalog.html">Квартири</a>
            <a href="about.html">Про нас</a>
            <a href="contact.html">Контакти</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="container page">
      <section class="card">
        <h1>Контакти</h1>
        <p>Зв’яжіться з нами, якщо хочете отримати консультацію або побачити актуальні пропозиції.</p>
        <ul class="contact-list">
          <li>Телефон: +38 (099) 123 45 67</li>
          <li>Email: hello@bluespace.ua</li>
          <li>Адреса: вул. Шевченка, 12, Київ</li>
        </ul>
        <a class="btn" href="mailto:hello@bluespace.ua">Написати листа</a>
      </section>
    </main>

    <footer class="container">
      <p>BlueSpace © 2026. Ми завжди поруч.</p>
    </footer>
  </body>
</html>
